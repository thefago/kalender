<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="1800">
  <title>Spenglerei Ilmer – Kalender</title>
  <style>
    :root {
      --green:       #97c00e;
      --green-dark:  #6e8c0a;
      --green-lt:    #c8e06a;
      --dark:        #2c2c2c;
      --gray:        #505050;
      --gray-lt:     #f0f0f0;
      --bg:          #f5f6f2;
      --bg2:         #eceee8;
      --cell:        #ffffff;
      --cell-week:   #f6fbed;
      --cell-today:  #eaf5d0;
      --cell-wend:   #f8f8f6;
      --border:      #d8dbd0;
      --border-acc:  #97c00e;
      --text:        #2c2c2c;
      --text-dim:    #7a8870;
      --text-dimmer: #b4bca8;
    }
    @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&family=Barlow+Condensed:wght@600;700;800&family=Source+Code+Pro:wght@400&display=swap');

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ══ HEADER ══ */
    #header {
      background: var(--dark);
      border-bottom: 3px solid var(--green);
      height: 66px;
      display: flex;
      align-items: stretch;
      flex-shrink: 0;
    }

    /* Logo – grüner Block wie auf Website */
    #logo-block {
      background: var(--green);
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      min-width: 150px;
    }
    #logo-img {
      height: 48px;
      width: auto;
      object-fit: contain;
      display: block;
    }
    #logo-fallback {
      display: none;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1;
    }
    #logo-sub-txt {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 600;
      color: #f0f0f0; letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    #logo-main-txt {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px; font-weight: 800;
      color: #2c2c2c; letter-spacing: 0.03em;
      text-transform: uppercase; line-height: 1;
    }

    #hd-sep { width:1px; height:36px; background:#444; margin:auto 0; flex-shrink:0; }

    #cal-info { flex:1; padding:0 18px; display:flex; flex-direction:column; justify-content:center; }
    #month-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px; font-weight: 700;
      color: #fff; letter-spacing: 0.02em; line-height:1;
    }
    #kw-range {
      font-family: 'Source Code Pro', monospace;
      font-size: 11px; color: #888; margin-top:2px;
    }

    #legend { display:flex; gap:14px; align-items:center; padding-right:18px; flex-shrink:0; }
    .leg    { display:flex; align-items:center; gap:5px; font-size:11px; color:#999; }
    .leg-dot { width:9px; height:9px; border-radius:2px; flex-shrink:0; }

    #clock {
      font-family: 'Source Code Pro', monospace;
      font-size: 34px; color: #fff;
      letter-spacing: 0.06em; padding-right:22px;
      display:flex; align-items:center; flex-shrink:0;
    }

    /* ══ WOCHENTAGE ══ */
    #weekdays {
      display: grid; grid-template-columns: repeat(7,1fr);
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .wd {
      text-align:center; padding:5px 0 4px;
      font-family:'Barlow Condensed',sans-serif;
      font-size:12px; font-weight:700; letter-spacing:0.12em;
      text-transform:uppercase; color:var(--text-dimmer);
      border-right:1px solid var(--border);
    }
    .wd:last-child { border-right:none; }
    .wd.we { color:#b0926a; }

    /* ══ GRID ══ */
    #grid {
      display:grid; grid-template-columns:repeat(7,1fr);
      grid-template-rows:repeat(4,1fr);
      flex:1; gap:1px; background:var(--border); min-height:0;
    }
    .cell {
      background:var(--cell); padding:6px 8px 4px;
      overflow:hidden; display:flex; flex-direction:column;
      position:relative; min-height:0;
      animation:fadeIn 0.3s ease both;
    }
    .cell.cur-week { background:var(--cell-week); }
    .cell.is-today { background:var(--cell-today); }
    .cell.weekend  { background:var(--cell-wend); }

    /* Grüner Akzent-Balken aktuelle Woche */
    .cell.cur-week::before {
      content:''; position:absolute; left:0; top:0; bottom:0;
      width:3px; background:var(--green); opacity:0.7;
    }
    .cell.is-today::before { opacity:1; }

    /* Neuer Monat */
    .cell.month-start::after {
      content:attr(data-month); position:absolute;
      top:5px; right:6px; font-size:9px;
      font-family:'Barlow Condensed',sans-serif; font-weight:700;
      letter-spacing:0.08em; color:var(--text-dimmer); text-transform:uppercase;
    }

    /* Datum */
    .cell-date {
      font-family:'Barlow Condensed',sans-serif;
      font-size:21px; font-weight:700; line-height:1;
      color:var(--text-dimmer); margin-bottom:4px; flex-shrink:0;
    }
    .cell.cur-week:not(.is-today) .cell-date { color:var(--green-dark); }
    .cell.is-today .cell-date {
      background:var(--green); color:#fff;
      width:28px; height:28px; border-radius:4px;
      line-height:28px; text-align:center;
      font-size:15px; margin-bottom:5px;
    }

    /* Events */
    .events { flex:1; overflow:hidden; min-height:0; }
    .ev {
      font-size:11px; padding:2px 5px 2px 7px;
      border-radius:3px; margin-bottom:2px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      line-height:1.4; position:relative;
    }
    .ev-time { font-family:'Source Code Pro',monospace; font-size:9px; opacity:0.6; margin-right:3px; }
    .more    { font-size:10px; color:var(--text-dimmer); padding-left:7px; margin-top:1px; }

    /* ══ STATUS ══ */
    #status {
      position:fixed; inset:0; background:rgba(245,246,242,0.96);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:16px; z-index:99;
    }
    #status.hidden { display:none; }
    #st-logo-wrap {
      background:var(--green); padding:12px 20px; border-radius:4px;
      margin-bottom:6px;
    }
    #st-logo    { height:48px; width:auto; display:block; }
    #st-logofb  { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:28px; color:#2c2c2c; letter-spacing:0.04em; display:none; }
    #st-text    { font-size:18px; color:var(--dark); }
    #st-sub     { font-size:12px; color:#888; font-family:'Source Code Pro',monospace; }
    .spinner    { width:32px; height:32px; border:3px solid #d0d0d0; border-top-color:var(--green); border-radius:50%; animation:spin 0.85s linear infinite; }
    @keyframes spin   { to { transform:rotate(360deg); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  </style>
</head>
<body>

<!-- Ladescreen -->
<div id="status">
  <div id="st-logo-wrap">
    <img id="st-logo"
         src="https://www.spenglerei-ilmer.it/wp-content/themes/Spenglerei%20Ilmer/img/logo.png"
         alt="Spenglerei Ilmer"
         onerror="this.style.display='none';document.getElementById('st-logofb').style.display='block'">
    <div id="st-logofb">ILMER E.</div>
  </div>
  <div class="spinner"></div>
  <div id="st-text">Kalender wird geladen …</div>
  <div id="st-sub">Verbinde mit Google Calendar</div>
</div>

<div id="header">
  <!-- Logo auf grünem Hintergrund -->
  <div id="logo-block">
    <img id="logo-img"
         src="https://www.spenglerei-ilmer.it/wp-content/themes/Spenglerei%20Ilmer/img/logo.png"
         alt="Spenglerei Ilmer"
         onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='flex'">
    <div id="logo-fallback">
      <span id="logo-sub-txt">Spenglerei</span>
      <span id="logo-main-txt">Ilmer E.</span>
    </div>
  </div>

  <div id="hd-sep"></div>

  <div id="cal-info">
    <div id="month-title">–</div>
    <div id="kw-range">–</div>
  </div>

  <div id="legend"></div>
  <div id="clock">–</div>
</div>

<div id="weekdays">
  <div class="wd">Montag</div><div class="wd">Dienstag</div>
  <div class="wd">Mittwoch</div><div class="wd">Donnerstag</div>
  <div class="wd">Freitag</div>
  <div class="wd we">Samstag</div><div class="wd we">Sonntag</div>
</div>

<div id="grid"></div>

<script>
var CALS = [
  { id:'fabian.goegele@gmail.com',                       color:'#3f51b5', label:'Persönlich'  },
  { id:'de.italian#holiday@group.v.calendar.google.com', color:'#7986cb', label:'Feiertage IT' },
  { id:'de.austrian#holiday@group.v.calendar.google.com',color:'#0b8043', label:'Feiertage AT' }
];
var GCAL_COLORS = {
  'tomato':'#d50000','flamingo':'#e67c73','tangerine':'#f4511e',
  'banana':'#f6bf26','sage':'#33b679','basil':'#0b8043',
  'peacock':'#039be5','blueberry':'#3f51b5','lavender':'#7986cb',
  'grape':'#8e24aa','graphite':'#616161'
};
var PROXY='https://corsproxy.io/?url=';
var MO_SH=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
var MO_FL=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

function monday(d){var r=new Date(d);r.setHours(0,0,0,0);var day=r.getDay();r.setDate(r.getDate()+((day===0)?-6:1-day));return r;}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function getKW(d){var t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));var dow=t.getUTCDay()||7;t.setUTCDate(t.getUTCDate()+4-dow);var y=new Date(Date.UTC(t.getUTCFullYear(),0,1));return Math.ceil((((t-y)/86400000)+1)/7);}

function hexToRgb(h){h=h.replace('#','');if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];return{r:parseInt(h.substr(0,2),16),g:parseInt(h.substr(2,2),16),b:parseInt(h.substr(4,2),16)};}
function evBg(hex){var c=hexToRgb(hex);return'rgba('+c.r+','+c.g+','+c.b+',0.13)';}
function evFg(hex){var c=hexToRgb(hex);var lum=(c.r*299+c.g*587+c.b*114)/1000;return lum>150?'rgb('+(c.r*0.6|0)+','+(c.g*0.6|0)+','+(c.b*0.6|0)+')':hex;}

function icalDate(v){v=v.replace('Z','');var Y=+v.substr(0,4),M=+v.substr(4,2)-1,D=+v.substr(6,2);if(v.length===8)return new Date(Y,M,D);return new Date(Y,M,D,+v.substr(9,2),+v.substr(11,2));}

function parseIcal(txt,idx,rS,rE){
  txt=txt.replace(/\r\n[ \t]/g,'').replace(/\n[ \t]/g,'');
  var lines=txt.split(/\r\n|\n|\r/),evs=[],cur=null;
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    if(l==='BEGIN:VEVENT'){cur={calIdx:idx,color:null};continue;}
    if(l==='END:VEVENT'){if(cur&&cur.start){var ex=expand(cur,rS,rE);for(var j=0;j<ex.length;j++)evs.push(ex[j]);}cur=null;continue;}
    if(!cur)continue;
    var sep=l.indexOf(':');if(sep<0)continue;
    var rk=l.substring(0,sep),v=l.substring(sep+1).trim(),k=rk.split(';')[0].toUpperCase();
    if(k==='SUMMARY') cur.title=v.replace(/\\,/g,',').replace(/\\n/g,' ').replace(/\\;/g,';');
    if(k==='DTSTART'){cur.allDay=(rk.indexOf('VALUE=DATE')>=0||v.length===8);cur.start=icalDate(v);}
    if(k==='DTEND')  cur.end=icalDate(v);
    if(k==='RRULE')  cur.rrule=v;
    if(k==='COLOR'||k==='X-GOOGLE-CALENDAR-EVENT-COLOR'){
      var raw=v.trim().toLowerCase();
      cur.color=GCAL_COLORS[raw]||(raw.match(/^#[0-9a-f]{6}$/)?raw:null);
    }
  }
  return evs;
}

function expand(ev,rS,rE){
  if(!ev.rrule){var s=ev.start,e=ev.end||addDays(s,1);return(s<rE&&e>rS)?[ev]:[];}
  var rules={};ev.rrule.split(';').forEach(function(p){var kv=p.split('=');rules[kv[0]]=kv[1];});
  var freq=rules.FREQ,intv=parseInt(rules.INTERVAL)||1;
  var until=rules.UNTIL?icalDate(rules.UNTIL):null,max=rules.COUNT?parseInt(rules.COUNT):400;
  var out=[],cur=new Date(ev.start),n=0;
  while(n<max){
    if(until&&cur>until)break;if(cur>rE)break;
    if(cur>=rS&&cur<rE)out.push({title:ev.title,start:new Date(cur),end:ev.end?new Date(ev.end):addDays(cur,1),allDay:ev.allDay,calIdx:ev.calIdx,color:ev.color});
    if(freq==='DAILY')cur.setDate(cur.getDate()+intv);
    else if(freq==='WEEKLY')cur.setDate(cur.getDate()+7*intv);
    else if(freq==='MONTHLY')cur.setMonth(cur.getMonth()+intv);
    else if(freq==='YEARLY')cur.setFullYear(cur.getFullYear()+intv);
    else break;n++;
  }
  return out;
}

function fetchCal(cal,idx,rS,rE){
  var url=PROXY+encodeURIComponent('https://calendar.google.com/calendar/ical/'+encodeURIComponent(cal.id)+'/public/basic.ics');
  return fetch(url).then(function(r){return r.text();}).then(function(t){return parseIcal(t,idx,rS,rE);}).catch(function(){return[];});
}

function tick(){
  var n=new Date();
  document.getElementById('clock').textContent=(n.getHours()<10?'0':'')+n.getHours()+':'+(n.getMinutes()<10?'0':'')+n.getMinutes();
}

function buildLegend(){
  var el=document.getElementById('legend');el.innerHTML='';
  CALS.forEach(function(c){
    var d=document.createElement('div');d.className='leg';
    var dot=document.createElement('div');dot.className='leg-dot';dot.style.background=c.color;
    var sp=document.createElement('span');sp.textContent=c.label;
    d.appendChild(dot);d.appendChild(sp);el.appendChild(d);
  });
}

function render(all){
  var today=new Date();today.setHours(0,0,0,0);
  var mon=monday(new Date());
  buildLegend();
  var mS=MO_FL[mon.getMonth()],mE=MO_FL[addDays(mon,27).getMonth()],yr=mon.getFullYear();
  document.getElementById('month-title').textContent=mS===mE?mS+' '+yr:mS+' / '+mE+' '+yr;
  var kw1=getKW(mon),kw4=getKW(addDays(mon,21));
  document.getElementById('kw-range').textContent='KW '+(kw4!==kw1?kw1+'–'+kw4:kw1)+'  ·  '+mon.getDate()+'. '+MO_SH[mon.getMonth()]+' – '+addDays(mon,27).getDate()+'. '+MO_SH[addDays(mon,27).getMonth()]+' '+yr;

  var byDay={};
  all.forEach(function(ev){
    var s=new Date(ev.start);s.setHours(0,0,0,0);
    var e=new Date(ev.end||addDays(s,1));e.setHours(0,0,0,0);
    for(var d=new Date(s);d<e;d=addDays(d,1)){var k=d.toDateString();if(!byDay[k])byDay[k]=[];byDay[k].push(ev);}
  });

  var grid=document.getElementById('grid');grid.innerHTML='';
  for(var row=0;row<4;row++){
    for(var col=0;col<7;col++){
      var date=addDays(mon,row*7+col);
      var isToday=sameDay(date,today);
      var cell=document.createElement('div');
      cell.className='cell'+(row===0?' cur-week':'')+(isToday?' is-today':'')+(col>=5?' weekend':'');
      cell.style.animationDelay=(row*7+col)*8+'ms';
      if(date.getDate()===1){cell.classList.add('month-start');cell.setAttribute('data-month',MO_SH[date.getMonth()]);}

      var dn=document.createElement('div');dn.className='cell-date';dn.textContent=date.getDate();cell.appendChild(dn);

      var wrap=document.createElement('div');wrap.className='events';
      var evs=(byDay[date.toDateString()]||[]).slice();
      evs.sort(function(a,b){return(a.allDay&&!b.allDay)?-1:(!a.allDay&&b.allDay)?1:a.start-b.start;});
      var shown=0;
      evs.forEach(function(ev){
        if(shown>=4)return;
        var color=ev.color||CALS[ev.calIdx].color;
        var pill=document.createElement('div');pill.className='ev';
        pill.style.background=evBg(color);
        pill.style.color=evFg(color);
        pill.style.borderLeft='3px solid '+color;
        pill.style.paddingLeft='6px';
        var lbl='';
        if(!ev.allDay){var hh=ev.start.getHours(),mm=ev.start.getMinutes();lbl='<span class="ev-time">'+(hh<10?'0':'')+hh+':'+(mm<10?'0':'')+mm+'</span>';}
        pill.innerHTML=lbl+(ev.title||'–');
        wrap.appendChild(pill);shown++;
      });
      if(evs.length>4){var more=document.createElement('div');more.className='more';more.textContent='+'+(evs.length-4)+' weitere';wrap.appendChild(more);}
      cell.appendChild(wrap);grid.appendChild(cell);
    }
  }
  document.getElementById('status').className='hidden';
}

tick();setInterval(tick,15000);
var rS=monday(new Date()),rE=addDays(rS,28);
var sub=document.getElementById('st-sub');
Promise.all(CALS.map(function(c,i){sub.textContent='Lade Kalender '+(i+1)+' von '+CALS.length+' …';return fetchCal(c,i,rS,rE);}))
  .then(function(res){var all=[];res.forEach(function(r){all=all.concat(r);});render(all);})
  .catch(function(){document.getElementById('st-text').textContent='Fehler – bitte Seite neu laden';});
</script>
</body>
</html>
