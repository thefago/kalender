<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <!-- Seite alle 30 Minuten automatisch neu laden -->
  <meta http-equiv="refresh" content="1800">
  <title>Kalender</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    iframe { display: block; width: 100vw; height: 100vh; border: none; }
  </style>
</head>
<body>

<iframe id="mein-kalender" frameborder="0" scrolling="no"></iframe>

<script>
  function getMondayOfWeek(d) {
    var day  = d.getDay();
    var diff = (day === 0) ? -6 : 1 - day;
    d.setDate(d.getDate() + diff);
    return d;
  }
  function toDate(d) {
    var mo = (d.getMonth()+1 < 10) ? "0"+(d.getMonth()+1) : ""+(d.getMonth()+1);
    var da = (d.getDate() < 10)    ? "0"+d.getDate()       : ""+ d.getDate();
    return "" + d.getFullYear() + mo + da;
  }

  var start = getMondayOfWeek(new Date());
  var end   = new Date(start);
  end.setDate(end.getDate() + 27);
  var dates = toDate(start) + "/" + toDate(end);

  var base = "https://calendar.google.com/calendar/embed"
    + "?height=1080&wkst=2&ctz=Europe%2FVienna"
    + "&showNav=0&showPrint=0&showTabs=0&showCalendars=0"
    + "&mode=AGENDA"
    + "&src=ZmFiaWFuLmdvZWdlbGVAZ21haWwuY29t&color=%233f51b5"
    + "&src=ZGUuaXRhbGlhbiNob2xpZGF5QGdyb3VwLnYuY2FsZW5kYXIuZ29vZ2xlLmNvbQ&color=%237986cb"
    + "&src=ZGUuYXVzdHJpYW4jaG9saWRheUBncm91cC52LmNhbGVuZGFyLmdvb2dsZS5jb20&color=%230b8043";

  base = base + "&dates=" + dates;

  document.getElementById("mein-kalender").src = base;
</script>

</body>
</html>
